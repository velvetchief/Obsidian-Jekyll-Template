---
layout: default
---

<article>
  <div>
    <h1>{{ page.title }}</h1>
    <time datetime="{{ page.last_modified_at | date_to_xmlschema }}">{% if page.type != 'pages' %}
      Last updated on {{ page.last_modified_at | date: "%B %-d, %Y" }}
      {% endif %}
    </time>
  </div>

  <content>
    {{ content }}
  </content>

  {% if page.tags.size > 0 %}
  <div style="margin-top: 2em; color: var(--color-subtext);">
    {% for tag in page.tags %}
      <a class="internal-link" href="{{ site.baseurl }}/tags/{{ tag | slugify }}">{{ tag }}</a>{% unless forloop.last %}, {% endunless %}
    {% endfor %}
  </div>
  {% endif %}
</article>
